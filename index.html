<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VSL PRIME PANEL</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #000000, #0f0f0f);
    color: white;
    font-family: Arial;
}

.container {
    padding: 20px;
    text-align: center;
}

h1 {
    color: gold;
}

.card {
    background: #111;
    margin: 15px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(255,215,0,0.2);
}

.number {
    font-size: 28px;
    color: #00ffcc;
}
</style>

</head>

<body>

<div class="container">

<h1>💎 VSL PRIME PANEL</h1>

<div class="card">
    <h2>🤖 Bots</h2>
    <div class="number">0</div>
</div>

<div class="card">
    <h2>👥 Users</h2>
    <div class="number">0</div>
</div>

<div class="card">
    <h2>📊 Status</h2>
    <div class="number">LIVE</div>
</div>

</div>

</body>
</html>
